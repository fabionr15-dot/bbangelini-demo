<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>B&B Angelini — Lucca · Una casa di famiglia dal 1911</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Nunito+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#f6efe2;
    --cream-deep:#efe4d0;
    --paper:#fbf6ec;
    --ochre:#c68a3e;
    --ochre-deep:#a86d29;
    --olive:#6b7048;
    --olive-deep:#535838;
    --brown:#4a3a2c;
    --brown-soft:#7a6350;
    --ink:#38291d;
    --rose:#c78b7a;
    --shadow:rgba(74,58,44,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:'Nunito Sans',system-ui,sans-serif;
    color:var(--ink);
    background:var(--cream);
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  h1,h2,h3,.serif{font-family:'Fraunces',Georgia,serif;font-weight:500;line-height:1.12;letter-spacing:-.01em}
  img{display:block;max-width:100%}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1160px;margin:0 auto;padding:0 26px}

  /* ---------- DEMO BAR ---------- */
  .demobar{
    background:var(--brown);
    color:#f0e6d6;
    font-size:.82rem;
    letter-spacing:.01em;
    padding:9px 20px;
    display:flex;align-items:center;justify-content:center;gap:18px;
    text-align:center;
    position:relative;z-index:60;
    flex-wrap:wrap;
  }
  .demobar .dot{color:var(--ochre);font-size:1.1em;line-height:0}
  .langtoggle{display:inline-flex;border:1px solid rgba(240,230,214,.35);border-radius:999px;overflow:hidden;flex:0 0 auto}
  .langtoggle button{
    background:transparent;border:none;color:#e7dccb;
    font-family:inherit;font-size:.78rem;font-weight:700;letter-spacing:.05em;
    padding:4px 12px;cursor:pointer;transition:.2s;
  }
  .langtoggle button.active{background:var(--ochre);color:#fff}

  /* ---------- NAV ---------- */
  header.nav{
    position:sticky;top:0;z-index:50;
    background:rgba(246,239,226,.9);
    backdrop-filter:blur(10px);
    border-bottom:1px solid rgba(122,99,80,.18);
  }
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:74px}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .mark{
    width:44px;height:44px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,var(--ochre),var(--ochre-deep));
    color:#fff;display:grid;place-items:center;
    font-family:'Fraunces',serif;font-size:1.35rem;font-weight:600;
    box-shadow:0 4px 14px rgba(168,109,41,.35);
  }
  .brand .bt{font-family:'Fraunces',serif;font-size:1.28rem;color:var(--brown);letter-spacing:.01em}
  .brand .bs{font-size:.66rem;letter-spacing:.28em;text-transform:uppercase;color:var(--brown-soft);margin-top:2px}
  nav.links{display:flex;gap:30px;align-items:center}
  nav.links a{font-size:.9rem;font-weight:600;color:var(--brown);position:relative;padding:4px 0;transition:.2s}
  nav.links a::after{content:"";position:absolute;left:0;bottom:-2px;width:0;height:2px;background:var(--ochre);transition:.25s;border-radius:2px}
  nav.links a:hover{color:var(--ochre-deep)}
  nav.links a:hover::after{width:100%}
  .btn{
    display:inline-block;font-family:'Nunito Sans',sans-serif;font-weight:700;
    background:var(--ochre);color:#fff;
    padding:12px 24px;border-radius:999px;font-size:.9rem;
    box-shadow:0 6px 18px rgba(168,109,41,.32);cursor:pointer;border:none;
    transition:.22s;letter-spacing:.01em;
  }
  .btn:hover{background:var(--ochre-deep);transform:translateY(-1px);box-shadow:0 9px 22px rgba(168,109,41,.4)}
  .btn.ghost{background:transparent;color:var(--brown);border:1.5px solid var(--brown-soft);box-shadow:none}
  .btn.ghost:hover{background:var(--brown);color:var(--paper);border-color:var(--brown)}
  .navcta{display:flex;align-items:center;gap:16px}

  /* ---------- HERO ---------- */
  .hero{position:relative;min-height:88vh;display:flex;align-items:flex-end;overflow:hidden}
  .hero-bg{position:absolute;inset:0}
  .hero-bg img{width:100%;height:100%;object-fit:cover}
  .hero-bg::after{content:"";position:absolute;inset:0;
    background:linear-gradient(180deg,rgba(58,41,29,.18) 0%,rgba(58,41,29,.12) 40%,rgba(58,41,29,.72) 100%)}
  .hero-content{position:relative;z-index:2;color:#fdf8ee;padding:0 0 66px}
  .hero-eyebrow{
    display:inline-flex;align-items:center;gap:9px;
    font-size:.78rem;letter-spacing:.22em;text-transform:uppercase;
    background:rgba(58,41,29,.42);backdrop-filter:blur(4px);
    padding:8px 16px;border-radius:999px;border:1px solid rgba(253,248,238,.25);
    margin-bottom:22px;
  }
  .hero-eyebrow .dotm{width:7px;height:7px;border-radius:50%;background:var(--ochre)}
  .hero h1{font-size:clamp(2.6rem,6vw,4.6rem);text-shadow:0 2px 24px rgba(40,26,15,.5);max-width:16ch}
  .hero h1 em{font-style:italic;color:#f2d9a8}
  .hero p.lead{font-size:clamp(1.05rem,1.7vw,1.28rem);max-width:44ch;margin-top:20px;color:#f4ead9;text-shadow:0 2px 12px rgba(40,26,15,.5)}
  .hero-actions{margin-top:30px;display:flex;gap:14px;flex-wrap:wrap}
  .hero-actions .btn.ghost{color:#fdf8ee;border-color:rgba(253,248,238,.6)}
  .hero-actions .btn.ghost:hover{background:#fdf8ee;color:var(--brown)}

  /* ---------- WELCOME / STORY ---------- */
  section{padding:88px 0}
  .kicker{font-size:.78rem;letter-spacing:.24em;text-transform:uppercase;color:var(--ochre-deep);font-weight:700;margin-bottom:14px}
  .story{display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center}
  .story .door{position:relative}
  .story .door img{border-radius:14px 14px 90px 14px;box-shadow:0 26px 50px -18px var(--shadow);width:100%;aspect-ratio:4/5;object-fit:cover}
  .story .door .stamp{
    position:absolute;bottom:-26px;left:-26px;
    background:var(--paper);border-radius:50%;width:132px;height:132px;
    display:grid;place-content:center;text-align:center;
    box-shadow:0 14px 30px -8px var(--shadow);border:2px solid var(--cream-deep);
    padding:10px;
  }
  .story .door .stamp .yr{font-family:'Fraunces',serif;font-size:1.9rem;color:var(--ochre-deep);line-height:1}
  .story .door .stamp .lb{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--brown-soft);margin-top:5px}
  .story h2{font-size:clamp(2rem,3.4vw,3rem);color:var(--brown)}
  .story h2 em{font-style:italic;color:var(--ochre-deep)}
  .story p{margin-top:18px;font-size:1.05rem;color:#5b4a3a}
  .story .sig{margin-top:24px;font-family:'Fraunces',serif;font-style:italic;font-size:1.35rem;color:var(--olive-deep)}
  .story .sig small{display:block;font-family:'Nunito Sans';font-style:normal;font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--brown-soft);margin-top:4px}

  /* detail chips */
  .details{background:var(--cream-deep);border-top:1px solid rgba(122,99,80,.14);border-bottom:1px solid rgba(122,99,80,.14)}
  .detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:34px}
  .detail{display:flex;gap:16px;align-items:flex-start}
  .detail .ic{flex:0 0 auto;width:48px;height:48px;border-radius:14px;background:var(--paper);display:grid;place-items:center;box-shadow:0 6px 14px -6px var(--shadow)}
  .detail .ic svg{width:24px;height:24px;stroke:var(--ochre-deep)}
  .detail h4{font-family:'Fraunces',serif;font-size:1.15rem;color:var(--brown);margin-bottom:3px;font-weight:600}
  .detail p{font-size:.92rem;color:#6b5844}

  /* ---------- SALA / authenticity ---------- */
  .authentic{display:grid;grid-template-columns:.95fr 1.05fr;gap:56px;align-items:center}
  .authentic .imgcol img{border-radius:14px;box-shadow:0 22px 46px -20px var(--shadow);width:100%;aspect-ratio:5/4;object-fit:cover}
  .authentic h2{font-size:clamp(1.9rem,3.2vw,2.7rem);color:var(--brown)}
  .authentic h2 em{font-style:italic;color:var(--olive-deep)}
  .authentic p{margin-top:16px;color:#5b4a3a}
  .badge-award{display:inline-flex;align-items:center;gap:10px;margin-top:22px;background:var(--olive);color:#f4f1e2;padding:9px 18px;border-radius:999px;font-size:.86rem;font-weight:700;letter-spacing:.02em}
  .badge-award svg{width:18px;height:18px;stroke:#f4f1e2}

  /* ---------- ROOMS ---------- */
  .rooms-head{text-align:center;max-width:640px;margin:0 auto 50px}
  .rooms-head h2{font-size:clamp(2rem,3.6vw,3rem);color:var(--brown)}
  .rooms-head h2 em{font-style:italic;color:var(--ochre-deep)}
  .rooms-head p{margin-top:14px;color:#6b5844}
  .rooms-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:26px}
  .room{
    background:var(--paper);border-radius:18px;overflow:hidden;
    box-shadow:0 16px 34px -22px var(--shadow);
    border:1px solid rgba(122,99,80,.1);
    transition:.28s;position:relative;
  }
  .room:hover{transform:translateY(-6px);box-shadow:0 26px 46px -20px var(--shadow)}
  .room .ph{position:relative;aspect-ratio:4/3;overflow:hidden}
  .room .ph img{width:100%;height:100%;object-fit:cover;transition:.5s}
  .room:hover .ph img{transform:scale(1.05)}
  .room .swatch{position:absolute;top:14px;left:14px;width:26px;height:26px;border-radius:50%;border:3px solid #fdf8ee;box-shadow:0 3px 8px rgba(0,0,0,.25)}
  .room .body{padding:20px 22px 24px}
  .room .body h3{font-size:1.35rem;color:var(--brown);font-weight:600}
  .room .body .type{font-size:.8rem;letter-spacing:.06em;text-transform:uppercase;color:var(--ochre-deep);font-weight:700;margin-top:4px}
  .room .body p{font-size:.9rem;color:#6b5844;margin-top:10px}
  .amen{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .amen span{font-size:.74rem;background:var(--cream-deep);color:#5b4a3a;padding:4px 10px;border-radius:999px;font-weight:600}

  /* ---------- MURA BAND ---------- */
  .mura{position:relative;min-height:62vh;display:flex;align-items:center;justify-content:center;text-align:center;color:#fdf8ee}
  .mura-bg{position:absolute;inset:0}
  .mura-bg img{width:100%;height:100%;object-fit:cover}
  .mura-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(58,41,29,.5),rgba(58,41,29,.68))}
  .mura-content{position:relative;z-index:2;padding:0 26px}
  .mura-content .kicker{color:#f2d9a8}
  .mura h2{font-size:clamp(2.1rem,4.6vw,3.6rem);text-shadow:0 2px 20px rgba(40,26,15,.5);max-width:20ch;margin:0 auto}
  .mura h2 em{font-style:italic;color:#f2d9a8}
  .mura p{margin-top:20px;font-size:1.08rem;max-width:52ch;margin-left:auto;margin-right:auto;color:#f4ead9;text-shadow:0 2px 12px rgba(40,26,15,.5)}
  .mura .figures{margin-top:34px;display:flex;gap:44px;justify-content:center;flex-wrap:wrap}
  .mura .fig .n{font-family:'Fraunces',serif;font-size:2.2rem;color:#f2d9a8}
  .mura .fig .l{font-size:.8rem;letter-spacing:.1em;text-transform:uppercase;color:#eaddc8}

  /* ---------- SERVICES ---------- */
  .services-head{text-align:center;max-width:620px;margin:0 auto 48px}
  .services-head h2{font-size:clamp(2rem,3.4vw,2.9rem);color:var(--brown)}
  .services-head h2 em{font-style:italic;color:var(--olive-deep)}
  .services-head p{margin-top:14px;color:#6b5844}
  .svc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}
  .svc{
    background:var(--paper);border-radius:16px;padding:26px 22px;text-align:center;
    box-shadow:0 12px 28px -20px var(--shadow);border:1px solid rgba(122,99,80,.1);
    transition:.24s;
  }
  .svc:hover{transform:translateY(-4px);border-color:rgba(198,138,62,.4)}
  .svc .ic{width:56px;height:56px;border-radius:16px;margin:0 auto 16px;display:grid;place-items:center;background:linear-gradient(140deg,var(--cream-deep),#f2e6d2)}
  .svc .ic svg{width:28px;height:28px;stroke:var(--ochre-deep)}
  .svc h4{font-family:'Fraunces',serif;font-size:1.12rem;color:var(--brown);font-weight:600;margin-bottom:6px}
  .svc p{font-size:.88rem;color:#6b5844}
  .svc-note{text-align:center;margin-top:28px;font-size:.9rem;color:var(--brown-soft);font-style:italic}

  /* ---------- AI ASSISTANT ---------- */
  .ai{background:linear-gradient(165deg,var(--brown) 0%,#33251a 100%);color:#f4ead9;position:relative;overflow:hidden}
  .ai::before{content:"";position:absolute;top:-120px;right:-120px;width:340px;height:340px;border-radius:50%;background:radial-gradient(circle,rgba(198,138,62,.28),transparent 70%)}
  .ai-inner{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;position:relative;z-index:2}
  .ai .kicker{color:#f2d9a8}
  .ai h2{font-size:clamp(2rem,3.6vw,3rem);color:#fdf8ee}
  .ai h2 em{font-style:italic;color:#f2d9a8}
  .ai .aitxt p{margin-top:18px;color:#e7d6bf;font-size:1.04rem}
  .ai-langs{display:flex;gap:10px;margin-top:24px;flex-wrap:wrap}
  .ai-langs span{background:rgba(253,248,238,.1);border:1px solid rgba(242,217,168,.35);padding:6px 14px;border-radius:999px;font-size:.82rem;font-weight:600}
  /* chat widget */
  .chat{
    background:var(--paper);border-radius:22px;overflow:hidden;
    box-shadow:0 30px 60px -22px rgba(0,0,0,.5);
    max-width:420px;margin:0 auto;width:100%;
  }
  .chat-top{background:var(--olive);color:#f4f1e2;padding:15px 20px;display:flex;align-items:center;gap:12px}
  .chat-top .av{width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--ochre),var(--ochre-deep));display:grid;place-items:center;font-family:'Fraunces',serif;font-weight:600;color:#fff;font-size:1.1rem}
  .chat-top .who{font-family:'Fraunces',serif;font-weight:600;font-size:1rem;line-height:1.1}
  .chat-top .stat{font-size:.72rem;color:#dfe6c9;display:flex;align-items:center;gap:6px;margin-top:2px}
  .chat-top .stat .live{width:7px;height:7px;border-radius:50%;background:#8fce6a;box-shadow:0 0 0 0 rgba(143,206,106,.7);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(143,206,106,.6)}70%{box-shadow:0 0 0 8px rgba(143,206,106,0)}100%{box-shadow:0 0 0 0 rgba(143,206,106,0)}}
  .chat-body{padding:20px 18px;min-height:340px;display:flex;flex-direction:column;gap:12px;background:linear-gradient(180deg,#fbf6ec,#f4ecdd)}
  .msg{max-width:80%;padding:11px 15px;border-radius:16px;font-size:.9rem;line-height:1.45;opacity:0;transform:translateY(10px);transition:.45s ease;position:relative}
  .msg.show{opacity:1;transform:translateY(0)}
  .msg .t{font-size:.66rem;opacity:.6;margin-top:5px;display:block}
  .msg.guest{align-self:flex-end;background:var(--olive);color:#f4f1e2;border-bottom-right-radius:5px}
  .msg.bot{align-self:flex-start;background:#fff;color:var(--ink);border:1px solid rgba(122,99,80,.14);border-bottom-left-radius:5px;box-shadow:0 3px 10px -6px var(--shadow)}
  .typing{align-self:flex-start;background:#fff;border:1px solid rgba(122,99,80,.14);padding:12px 16px;border-radius:16px;border-bottom-left-radius:5px;display:none;gap:4px}
  .typing.show{display:flex}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--brown-soft);animation:bob 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}
  .typing span:nth-child(3){animation-delay:.4s}
  @keyframes bob{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}
  .chat-foot{padding:12px 16px;background:var(--paper);border-top:1px solid rgba(122,99,80,.12);display:flex;justify-content:center}
  .replay{background:transparent;border:1.5px solid var(--ochre);color:var(--ochre-deep);font-family:'Nunito Sans';font-weight:700;font-size:.82rem;padding:8px 18px;border-radius:999px;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:7px}
  .replay:hover{background:var(--ochre);color:#fff}
  .replay svg{width:15px;height:15px}

  /* ---------- CONTACT / FOOTER ---------- */
  .contact{background:var(--cream-deep)}
  .contact-inner{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center}
  .contact h2{font-size:clamp(2rem,3.4vw,2.8rem);color:var(--brown)}
  .contact h2 em{font-style:italic;color:var(--ochre-deep)}
  .contact p.intro{margin-top:16px;color:#5b4a3a}
  .cc{display:flex;gap:14px;align-items:center;margin-top:20px}
  .cc .ic{width:46px;height:46px;border-radius:14px;background:var(--paper);display:grid;place-items:center;flex:0 0 auto;box-shadow:0 6px 14px -8px var(--shadow)}
  .cc .ic svg{width:22px;height:22px;stroke:var(--ochre-deep)}
  .cc .lb{font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;color:var(--brown-soft)}
  .cc .vl{font-family:'Fraunces',serif;font-size:1.15rem;color:var(--brown)}
  .contact .imgcol img{border-radius:14px;width:100%;aspect-ratio:4/3;object-fit:cover;box-shadow:0 22px 44px -22px var(--shadow)}

  footer{background:var(--brown);color:#e7d6bf;padding:52px 0 34px}
  .foot-top{display:flex;justify-content:space-between;align-items:flex-start;gap:30px;flex-wrap:wrap;padding-bottom:28px;border-bottom:1px solid rgba(242,217,168,.18)}
  .foot-brand{display:flex;gap:12px;align-items:center}
  .foot-brand .mark{width:48px;height:48px;border-radius:50%;background:radial-gradient(circle at 35% 30%,var(--ochre),var(--ochre-deep));display:grid;place-items:center;font-family:'Fraunces',serif;font-size:1.4rem;color:#fff;font-weight:600}
  .foot-brand .bt{font-family:'Fraunces',serif;font-size:1.3rem;color:#fdf8ee}
  .foot-brand .bs{font-size:.66rem;letter-spacing:.24em;text-transform:uppercase;color:#c9b596;margin-top:3px}
  .foot-cols{display:flex;gap:60px;flex-wrap:wrap}
  .foot-cols .col h5{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:#c9b596;margin-bottom:12px}
  .foot-cols .col a,.foot-cols .col p{display:block;font-size:.9rem;color:#e7d6bf;margin-bottom:7px}
  .foot-cols .col a:hover{color:#f2d9a8}
  .credit{margin-top:26px;font-size:.84rem;color:#c9b596;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .credit .dd{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,#00D4FF,#8B5CF6);display:inline-grid;place-items:center;font-size:.62rem;font-weight:800;color:#fff;font-family:'Nunito Sans'}

  @media(max-width:980px){
    .story,.authentic,.ai-inner,.contact-inner{grid-template-columns:1fr;gap:38px}
    .authentic .imgcol{order:-1}
    .detail-grid,.rooms-grid{grid-template-columns:repeat(2,1fr)}
    .svc-grid{grid-template-columns:repeat(2,1fr)}
  }
  @media(max-width:860px){
    nav.links{display:none}
    .navcta .btn.ghost{display:none}
  }
  @media(max-width:620px){
    section{padding:60px 0}
    .detail-grid,.rooms-grid,.svc-grid{grid-template-columns:1fr}
    .story .door .stamp{width:104px;height:104px;left:auto;right:-10px;bottom:-20px}
    .hero{min-height:82vh}
    .foot-cols{gap:34px}
  }
</style>
</head>
<body>

<!-- DEMO BAR -->
<div class="demobar">
  <span class="dot">✦</span>
  <span data-i18n="demobar"></span>
  <div class="langtoggle">
    <button data-lang="it" class="active" onclick="setLang('it')">IT</button>
    <button data-lang="en" onclick="setLang('en')">EN</button>
  </div>
</div>

<!-- NAV -->
<header class="nav">
  <div class="wrap nav-inner">
    <a href="#" class="brand">
      <span class="mark">A</span>
      <span>
        <div class="bt">B&amp;B Angelini</div>
        <div class="bs" data-i18n="brandSub"></div>
      </span>
    </a>
    <nav class="links">
      <a href="#casa" data-i18n="navHome"></a>
      <a href="#camere" data-i18n="navRooms"></a>
      <a href="#mura" data-i18n="navWalls"></a>
      <a href="#servizi" data-i18n="navServices"></a>
      <a href="#assistente" data-i18n="navAssistant"></a>

    {who:'guest',t:'23:14',txt:'Buonasera, avete una camera matrimoniale per il prossimo weekend? Il parcheggio è incluso?'},
    {who:'bot',txt:'Buonasera! Sì: la Camera Blu (matrimoniale) è libera da venerdì a domenica. Bagno privato, aria condizionata e parcheggio riservato proprio davanti, incluso.'},
    {who:'bot',txt:'La colazione è inclusa, servita nel bar convenzionato a due passi. Vuole che la blocchi? Posso confermarle la prenotazione diretta ora — senza commissioni.'},
    {who:'guest',t:'23:15',txt:'Perfetto, la prendo!'}
  ],
  en:[
    {who:'guest',t:'11:14 PM',txt:'Good evening, do you have a double room for next weekend? Is parking included?'},
    {who:'bot',txt:'Good evening! Yes — our Camera Blu (double) is free Friday to Sunday. Private bathroom, air-conditioning and reserved parking right in front, included.'},
    {who:'bot',txt:'Breakfast is included, served at our partner bar two steps away. Shall I hold it for you? I can confirm a direct booking right now — no commission.'},
    {who:'guest',t:'11:15 PM',txt:"Perfect, I'll take it!"}
  ]
};

/* ---------------- RENDER ---------------- */
let currentLang='it';

function renderRooms(){
  const grid=document.getElementById('roomsGrid');
  grid.innerHTML='';
  const r18=ROOMS_I18N[currentLang];
  const amen=AMEN_I18N[currentLang];
  rooms.forEach(r=>{
    const info=r18[r.key];
    const el=document.createElement('div');
    el.className='room';
    el.innerHTML=`
      <div class="ph">
        <span class="swatch" style="background:${r.color}"></span>
        <img src="${r.img}" alt="${info.name}">
      </div>
      <div class="body">
        <h3>${info.name}</h3>
        <div class="type">${info.type}</div>
        <p>${info.desc}</p>
        <div class="amen">${amen.map(a=>`<span>${a}</span>`).join('')}</div>
      </div>`;
    grid.appendChild(el);
  });
}

function renderServices(){
  const grid=document.getElementById('svcGrid');
  grid.innerHTML='';
  SERVICES.forEach(s=>{
    const info=s[currentLang];
    const el=document.createElement('div');
    el.className='svc';
    el.innerHTML=`
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${SVG_ICONS[s.ic]}</svg></div>
      <h4>${info.t}</h4>
      <p>${info.p}</p>`;
    grid.appendChild(el);
  });
}

function applyI18n(){
  const dict=I18N[currentLang];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const key=el.getAttribute('data-i18n');
    if(dict[key]!==undefined) el.innerHTML=dict[key];
  });
  document.documentElement.lang=currentLang;
}

function setLang(lang){
  if(lang===currentLang) {return;}
  currentLang=lang;
  document.querySelectorAll('.langtoggle button').forEach(b=>{
    b.classList.toggle('active', b.getAttribute('data-lang')===lang);
  });
  applyI18n();
  renderRooms();
  renderServices();
  playChat();
}

/* ---------------- CHAT ANIMATION ---------------- */
let chatTimers=[];
function clearChat(){ chatTimers.forEach(t=>clearTimeout(t)); chatTimers=[]; }

function playChat(){
  clearChat();
  const body=document.getElementById('chatBody');
  body.innerHTML='';
  const script=CHAT_SCRIPTS[currentLang];
  let delay=350;
  script.forEach((m,i)=>{
    if(m.who==='bot'){
      // show typing indicator, then message
      chatTimers.push(setTimeout(()=>{
        const typing=document.createElement('div');
        typing.className='typing show';
        typing.id='typing';
        typing.innerHTML='<span></span><span></span><span></span>';
        body.appendChild(typing);
        body.scrollTop=body.scrollHeight;
      }, delay));
      delay+=900;
      chatTimers.push(setTimeout(()=>{
        const tp=document.getElementById('typing');
        if(tp) tp.remove();
        appendMsg(body,m);
      }, delay));
      delay+=550;
    } else {
      chatTimers.push(setTimeout(()=>{ appendMsg(body,m); }, delay));
      delay+=900;
    }
  });
}

function appendMsg(body,m){
  const el=document.createElement('div');
  el.className='msg '+(m.who==='bot'?'bot':'guest');
  el.innerHTML=`${m.txt}${m.t?`<span class="t">${m.t}</span>`:''}`;
  body.appendChild(el);
  requestAnimationFrame(()=>{ requestAnimationFrame(()=>el.classList.add('show')); });
  body.scrollTop=body.scrollHeight;
}

/* ---------------- INIT ---------------- */
applyI18n();
renderRooms();
renderServices();

// auto-play chat when it scrolls into view (first time)
let chatPlayed=false;
const aiSection=document.getElementById('assistente');
const io=new IntersectionObserver((entries)=>{
  entries.forEach(e=>{
    if(e.isIntersecting && !chatPlayed){
      chatPlayed=true;
      playChat();
    }
  });
},{threshold:.35});
io.observe(aiSection);

// also kick a first play shortly after load so it's ready if the widget is near top
window.addEventListener('load',()=>{
  setTimeout(()=>{ if(!chatPlayed){ playChat(); chatPlayed=true; } }, 1200);
});
</script>
